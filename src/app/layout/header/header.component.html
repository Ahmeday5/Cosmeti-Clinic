<header class="header" dir="rtl">
  <div class="header-inner">

    <!-- ─── Brand Section ──────────────────────────────────────────── -->
    <div class="header-brand">
      <button class="btn-menu d-lg-none" (click)="toggleSidebar()" type="button" aria-label="toggle menu">
        <i class="fas fa-bars"></i>
      </button>

      <img src="/assets/img/logo.png" alt="Logo" class="header-logo">

      <div class="header-titles">
        <span class="header-title">نظام التحكم الطبي</span>
        <span class="header-subtitle d-none d-sm-block">نظام إدارة متكامل للعيادات التجميلية</span>
      </div>
    </div>

    <!-- ─── Actions Section ─────────────────────────────────────────── -->
    <div class="header-actions">

      <!-- Stats Chips -->
      @if(hasLoaded && Visits) {
      <div class="header-stats d-none d-lg-flex">
        <div class="stat-chip">
          <i class="fas fa-calendar-day"></i>
          <span>{{ Visits.date }}</span>
        </div>
        <div class="stat-chip">
          <i class="fas fa-eye"></i>
          <span>{{ Visits.todayVisits }} زيارة</span>
        </div>
      </div>
      }

      <div class="header-sep d-none d-lg-block"></div>

      <!-- User Dropdown -->
      <div class="dropdown">
        <button
          class="btn-user dropdown-toggle"
          type="button"
          data-bs-toggle="dropdown"
          aria-expanded="false"
        >
          <div class="user-avatar">
            <i class="fas fa-user-shield"></i>
          </div>
          <div class="user-meta d-none d-md-flex">
            <span class="user-name">المدير</span>
            <span class="user-role">مسؤول النظام</span>
          </div>
          <i class="fas fa-chevron-down chevron d-none d-md-inline-block"></i>
        </button>

        <ul class="dropdown-menu dropdown-menu-start border-0 shadow-lg">
          <li class="dropdown-info">
            <div class="dropdown-avatar">
              <i class="fas fa-user-shield"></i>
            </div>
            <div>
              <p class="dropdown-username">المدير</p>
              <p class="dropdown-role">مسؤول النظام</p>
            </div>
          </li>
          <li><hr class="dropdown-divider my-1"></li>

          @if(hasLoaded && Visits) {
          <li class="visits-mobile d-lg-none px-3 py-2">
            <div class="d-flex gap-2 flex-wrap">
              <span class="visit-badge"><i class="fas fa-calendar-day me-1"></i>{{ Visits.date }}</span>
              <span class="visit-badge"><i class="fas fa-eye me-1"></i>{{ Visits.todayVisits }} زيارة</span>
            </div>
          </li>
          <li class="d-lg-none"><hr class="dropdown-divider my-1"></li>
          }

          <li>
            <button class="dropdown-item logout-item" (click)="logout()">
              <i class="fas fa-sign-out-alt"></i>
              <span>تسجيل الخروج</span>
            </button>
          </li>
        </ul>
      </div>
    </div>
  </div>
</header>
